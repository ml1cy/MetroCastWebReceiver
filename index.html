<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
    <title>Metrolist Cast Receiver</title>
    
    <style>
        :root {
            --md-sys-color-background: #1C1B1F;
            --md-sys-color-on-background: #E6E1E5;
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-surface-variant: #49454F;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--md-sys-color-on-background);
        }

        /* NEST HUB FIX:
           Google automatically injects massive <touch-controls> elements 
           on Smart Displays with a z-index of 1,000,000. We explicitly destroy them here. 
        */
        cast-media-player, 
        touch-controls,
        goog-audio-player-compatibility {
            display: none !important;
            position: absolute !important;
            top: -9999px !important;
            left: -9999px !important;
            width: 0 !important;
            height: 0 !important;
            z-index: -1 !important;
            opacity: 0 !important;
            pointer-events: none !important; /* Stops it from stealing touch events */
        }

        /* Our custom UI now uses the maximum 32-bit integer for z-index
           to mathematically guarantee it sits above Google's 1,000,000 z-index.
        */
        .custom-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 2147483647 !important; 
            background-color: var(--md-sys-color-background);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .player-container {
            display: flex;
            width: 85%;
            max-width: 1600px;
            align-items: center;
            gap: 80px;
        }

        .album-art-container {
            flex-shrink: 0;
        }

        .album-art {
            width: 500px;
            height: 500px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            object-fit: cover;
        }

        .track-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .track-title {
            font-size: 4rem;
            font-weight: bold;
            margin: 0 0 16px 0;
            line-height: 1.1;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .track-artist {
            font-size: 2.5rem;
            color: var(--md-sys-color-primary);
            margin: 0 0 48px 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .progress-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background-color: var(--md-sys-color-surface-variant);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 0%; 
            height: 100%;
            background-color: var(--md-sys-color-primary);
            border-radius: 6px;
            transition: width 0.5s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            opacity: 0.8;
        }

        /* --- NEW PLAYBACK CONTROLS CSS --- */
        .controls-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
            margin-top: 32px;
            width: 100%;
        }

        .control-btn {
            background: transparent;
            border: none;
            color: var(--md-sys-color-on-background);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 72px;
            height: 72px;
            border-radius: 50%;
            transition: background-color 0.2s ease, transform 0.1s ease;
            outline: none;
        }

        .control-btn:active {
            background-color: rgba(255, 255, 255, 0.15);
            transform: scale(0.95);
        }

        .control-btn svg {
            width: 48px;
            height: 48px;
            fill: currentColor;
        }

        .play-pause-btn {
            background-color: var(--md-sys-color-primary);
            color: var(--md-sys-color-background);
            width: 96px;
            height: 96px;
        }

        .play-pause-btn:active {
            background-color: #EADDFF; /* Lighter primary on press */
        }

        .play-pause-btn svg {
            width: 56px;
            height: 56px;
        }

    </style>
</head>
<body>

    <cast-media-player></cast-media-player>
    
    <div class="custom-overlay">
        <div class="player-container">
            <div class="album-art-container">
                <img class="album-art" id="ui-album-art" src="/images/placehold.svg" alt="Album Art">
            </div>
            
            <div class="track-info">
                <h1 class="track-title" id="ui-title">Ready to Cast</h1>
                <h2 class="track-artist" id="ui-artist">Metrolist</h2>
                
                <div class="progress-container">
                    <div class="progress-bar-bg">
                        <div class="progress-bar-fill" id="ui-progress"></div>
                    </div>
                    <div class="time-info">
                        <span id="ui-time-current">0:00</span>
                        <span id="ui-time-total">0:00</span>
                    </div>
                </div>

                <div class="controls-row">
                    <button id="ui-btn-prev" class="control-btn" aria-label="Previous">
                        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                    </button>
                    <button id="ui-btn-play-pause" class="control-btn play-pause-btn" aria-label="Play or Pause">
                        <svg id="ui-icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <svg id="ui-icon-pause" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                    </button>
                    <button id="ui-btn-next" class="control-btn" aria-label="Next">
                        <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script>
        if (typeof cast === 'undefined') {
            console.error("Google Cast SDK failed to load. Ensure you are on HTTPS and scripts aren't blocked.");
            document.getElementById('ui-title').innerText = "Cast SDK Error";
            document.getElementById('ui-artist').innerText = "Failed to load framework.";
        } else {
            console.log("Metrolist Receiver: Initializing Cast Context...");
            const context = cast.framework.CastReceiverContext.getInstance();
            const playerManager = context.getPlayerManager();

            // Listen for Track Changes 
            playerManager.addEventListener(
                cast.framework.events.EventType.MEDIA_STATUS, (event) => {
                    console.log("Metrolist Receiver: Received MEDIA_STATUS event", event);
                    
                    const mediaInfo = playerManager.getMediaInformation();
                    
                    if (mediaInfo && mediaInfo.metadata) {
                        console.log("Metrolist Receiver: Track Metadata extracted:", mediaInfo.metadata);
                        
                        document.getElementById('ui-title').innerText = mediaInfo.metadata.title || 'Unknown Title';
                        document.getElementById('ui-artist').innerText = mediaInfo.metadata.artist || 'Unknown Artist';
                        
                        if (mediaInfo.metadata.images && mediaInfo.metadata.images.length > 0) {
                            console.log("Metrolist Receiver: Loading Album Art URL:", mediaInfo.metadata.images[0].url);
                            document.getElementById('ui-album-art').src = mediaInfo.metadata.images[0].url;
                        }
                    } else {
                        console.warn("Metrolist Receiver: No metadata found in MEDIA_STATUS event.");
                    }
                }
            );

            // Listen for Playback Progress
            playerManager.addEventListener(
                cast.framework.events.EventType.TIME_UPDATE, (event) => {
                    const currentTime = event.currentMediaTime;
                    const duration = playerManager.getDurationSec();
                    
                    if (duration > 0) {
                        const progressPercent = (currentTime / duration) * 100;
                        document.getElementById('ui-progress').style.width = progressPercent + '%';
                        
                        document.getElementById('ui-time-current').innerText = formatTime(currentTime);
                        document.getElementById('ui-time-total').innerText = formatTime(duration);
                    }
                }
            );

            // Listen for Play/Pause State
            playerManager.addEventListener(
                cast.framework.events.EventType.PLAYER_STATE_CHANGED, (event) => {
                    console.log("Metrolist Receiver: Player state changed to", event.playerState);
                    const state = event.playerState;
                    const playIcon = document.getElementById('ui-icon-play');
                    const pauseIcon = document.getElementById('ui-icon-pause');
                    
                    if (state === cast.framework.messages.PlayerState.PLAYING || 
                        state === cast.framework.messages.PlayerState.BUFFERING) {
                        playIcon.style.display = 'none';
                        pauseIcon.style.display = 'block';
                    } else {
                        playIcon.style.display = 'block';
                        pauseIcon.style.display = 'none';
                    }
                }
            );

            // Handle Play/Pause Button Click
            document.getElementById('ui-btn-play-pause').addEventListener('click', () => {
                const state = playerManager.getPlayerState();
                console.log("Metrolist Receiver: Play/Pause clicked. Current state:", state);
                if (state === cast.framework.messages.PlayerState.PLAYING || 
                    state === cast.framework.messages.PlayerState.BUFFERING) {
                    playerManager.pause();
                } else {
                    playerManager.play();
                }
            });

            document.getElementById('ui-btn-prev').addEventListener('click', () => {
                console.log("Metrolist Receiver: Previous clicked");
                const request = new cast.framework.messages.QueueUpdateRequestData();
                request.jump = -1;
                playerManager.sendLocalMediaRequest(request);
            });

            document.getElementById('ui-btn-next').addEventListener('click', () => {
                console.log("Metrolist Receiver: Next clicked");
                const request = new cast.framework.messages.QueueUpdateRequestData();
                request.jump = 1;
                playerManager.sendLocalMediaRequest(request);
            });

            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return "0:00";
                const min = Math.floor(seconds / 60);
                const sec = Math.floor(seconds % 60);
                return min + ":" + (sec < 10 ? "0" + sec : sec);
            }

            // Start the receiver context 
            const options = new cast.framework.CastReceiverOptions();
            
            // Disable the default timeout so the screen doesn't turn off if paused
            options.disableIdleTimeout = true;
            
            // Tell Google we do NOT want the Smart Display Touch UI
            const uiConfig = new cast.framework.ui.UiConfig();
            uiConfig.touchScreenOptimizedApp = false;
            options.uiConfig = uiConfig;
            
            // Set logging level so we can see framework internals in the console if needed
            options.customNamespaces = Object.assign({});
            cast.framework.CastReceiverContext.getInstance().setLoggerLevel(cast.framework.LoggerLevel.DEBUG);
            
            console.log("Metrolist Receiver: Starting context...");
            context.start(options);

            // Erase all default Smart Display UI buttons just in case it still tries to load
            try {
                const controls = cast.framework.ui.Controls.getInstance();
                controls.clearDefaultSlotAssignments();
                console.log("Metrolist Receiver: Cleared default Smart Display controls.");
            } catch (e) {
                console.log("Metrolist Receiver: UI Controls not applicable.");
            }
        }
    </script>
</body>
</html>
