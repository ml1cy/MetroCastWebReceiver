<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metrolist Cast Receiver</title>
    
    <style>
        :root {
            --md-sys-color-background: #1C1B1F;
            --md-sys-color-on-background: #E6E1E5;
            --md-sys-color-primary: #D0BCFF;
            --md-sys-color-surface-variant: #49454F;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--md-sys-color-background);
            color: var(--md-sys-color-on-background);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .player-container {
            display: flex;
            width: 85%;
            max-width: 1600px;
            align-items: center;
            gap: 80px;
        }

        .album-art-container {
            flex-shrink: 0;
        }

        .album-art {
            width: 500px;
            height: 500px;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            object-fit: cover;
        }

        .track-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .track-title {
            font-size: 4rem;
            font-weight: bold;
            margin: 0 0 16px 0;
            line-height: 1.1;
        }

        .track-artist {
            font-size: 2.5rem;
            color: var(--md-sys-color-primary);
            margin: 0 0 48px 0;
        }

        .progress-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background-color: var(--md-sys-color-surface-variant);
            border-radius: 6px;
            overflow: hidden;
        }

        .progress-bar-fill {
            width: 35%; 
            height: 100%;
            background-color: var(--md-sys-color-primary);
            border-radius: 6px;
            transition: width 1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 1.5rem;
            opacity: 0.8;
        }

        cast-media-player {
            display: none; 
        }
    </style>
</head>
<body>

    <cast-media-player></cast-media-player>

    <div class="player-container">
        <div class="album-art-container">
            <img class="album-art" id="ui-album-art" src="https://upload.wikimedia.org/wikipedia/en/thumb/6/61/Kendrick_Lamar_-_Not_Like_Us.png/250px-Kendrick_Lamar_-_Not_Like_Us.png" alt="Album Art">
        </div>
        
        <div class="track-info">
            <h1 class="track-title" id="ui-title">Not Like Us</h1>
            <h2 class="track-artist" id="ui-artist">Kendrick Lamar</h2>
            
            <div class="progress-container">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="ui-progress"></div>
                </div>
                <div class="time-info">
                    <span id="ui-time-current">0:52</span>
                    <span id="ui-time-total">4:34</span>
                </div>
            </div>
        </div>
    </div>

    <script>

        console.log("Metrolist UI Loaded.");
        
        function updatePlayerUI(title, artist, coverUrl) {
            document.getElementById('ui-title').innerText = title;
            document.getElementById('ui-artist').innerText = artist;
            document.getElementById('ui-album-art').src = coverUrl;
        }
    </script>
</body>
</html>
